# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/cdk-deploy-reusable.yml
#
# REUSABLE workflow  –  generic CDK deploy + destroy logic.
#
# Called by the three stack-specific workflows:
#   • deploy-environment.yml
#   • deploy-client-infra.yml
#   • deploy-ecs.yml
#   • (and by app-repo service workflows)
#
# Inputs
# ──────
#   stack_name       CDK stack name to deploy (e.g. "EnvironmentStack")
#   stack_name_full  Fully qualified stack name used by CloudFormation
#   aws_region       AWS region to deploy to
#   environment      Deployment environment (poc / staging / production)
#   node_version     Node.js version (default "20")
#   cdk_version      CDK CLI version (default "latest")
#   working_dir      Directory containing cdk.json (default ".")
#   action           "deploy" or "destroy" (default "deploy")
#   extra_context    Additional --context key=value pairs (optional)
#
# Secrets (must be configured in GitHub repository / environment settings)
# ──────────────────────────────────────────────────────────────────────────
#   AWS_ROLE_ARN     ARN of the IAM role to assume (OIDC)
#
# ─────────────────────────────────────────────────────────────────────────────

name: CDK Deploy (Reusable)

on:
  workflow_call:
    inputs:

      stack_name:
        description: "CDK stack logical ID (e.g. EnvironmentStack)"
        required: true
        type: string

      stack_name_full:
        description: "CloudFormation stack name (e.g. migration-poc-poc-environment)"
        required: false
        type: string
        default: ""

      aws_region:
        description: "AWS region to deploy to"
        required: true
        type: string

      environment:
        description: "Deployment environment name (e.g. poc, staging, production)"
        required: true
        type: string

      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"

      cdk_version:
        description: "AWS CDK CLI version"
        required: false
        type: string
        default: "latest"

      working_dir:
        description: "Directory containing cdk.json"
        required: false
        type: string
        default: "."

      action:
        description: "Action to perform: deploy | destroy"
        required: false
        type: string
        default: "deploy"

      extra_context:
        description: "Additional --context flags (space-separated key=value pairs)"
        required: false
        type: string
        default: ""

    secrets:
      AWS_ROLE_ARN:
        description: "IAM role ARN to assume via OIDC"
        required: true

    outputs:
      stack_status:
        description: "Final CloudFormation stack status"
        value: ${{ jobs.cdk_deploy.outputs.stack_status }}

# ── Permissions for OIDC token issuance ─────────────────────────────────────
permissions:
  id-token: write   # Required for aws-actions/configure-aws-credentials OIDC
  contents: read

jobs:
  cdk_deploy:
    name: "CDK ${{ inputs.action }} › ${{ inputs.stack_name }} @ ${{ inputs.aws_region }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    outputs:
      stack_status: ${{ steps.deploy.outputs.stack_status }}

    defaults:
      run:
        working-directory: ${{ inputs.working_dir }}

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configure Node.js ─────────────────────────────────────────────
      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_dir }}/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. TypeScript build (catches type errors early) ─────────────────
      - name: Build TypeScript
        run: npm run build

      # ── 5. Install CDK CLI ───────────────────────────────────────────────
      - name: Install AWS CDK CLI
        run: |
          if [ "${{ inputs.cdk_version }}" = "latest" ]; then
            npm install -g aws-cdk
          else
            npm install -g aws-cdk@${{ inputs.cdk_version }}
          fi
          cdk --version

      # ── 6. Configure AWS credentials via OIDC ───────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: "github-cdk-${{ inputs.stack_name }}-${{ github.run_id }}"
          role-duration-seconds: 3600

      # ── 7. Verify AWS identity ───────────────────────────────────────────
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── 8. CDK Bootstrap (idempotent – safe to run every time) ──────────
      - name: CDK Bootstrap
        run: |
          cdk bootstrap \
            aws://${{ vars.AWS_ACCOUNT_ID }}/${{ inputs.aws_region }} \
            --context account=${{ vars.AWS_ACCOUNT_ID }} \
            --context region=${{ inputs.aws_region }}

      # ── 9. CDK Synth (validate & preview) ───────────────────────────────
      - name: CDK Synth
        run: |
          CONTEXT_FLAGS="--context account=${{ vars.AWS_ACCOUNT_ID }} --context region=${{ inputs.aws_region }}"
          if [ -n "${{ inputs.extra_context }}" ]; then
            for pair in ${{ inputs.extra_context }}; do
              CONTEXT_FLAGS="$CONTEXT_FLAGS --context $pair"
            done
          fi
          cdk synth ${{ inputs.stack_name }} $CONTEXT_FLAGS

      # ── 10. Upload synth output as artifact ─────────────────────────────
      - name: Upload CloudFormation template
        uses: actions/upload-artifact@v4
        with:
          name: "cfn-template-${{ inputs.stack_name }}-${{ github.run_id }}"
          path: "${{ inputs.working_dir }}/cdk.out/*.template.json"
          retention-days: 30

      # ── 11. CDK Deploy or Destroy ────────────────────────────────────────
      - name: CDK ${{ inputs.action }}
        id: deploy
        run: |
          CONTEXT_FLAGS="--context account=${{ vars.AWS_ACCOUNT_ID }} --context region=${{ inputs.aws_region }}"
          if [ -n "${{ inputs.extra_context }}" ]; then
            for pair in ${{ inputs.extra_context }}; do
              CONTEXT_FLAGS="$CONTEXT_FLAGS --context $pair"
            done
          fi

          if [ "${{ inputs.action }}" = "destroy" ]; then
            echo "⚠️  Destroying stack ${{ inputs.stack_name }} in ${{ inputs.aws_region }}"
            cdk destroy ${{ inputs.stack_name }} \
              --force \
              $CONTEXT_FLAGS
          else
            cdk deploy ${{ inputs.stack_name }} \
              --require-approval never \
              --outputs-file cdk-outputs.json \
              $CONTEXT_FLAGS
          fi

          # Capture final stack status
          STACK_ID="${{ inputs.stack_name_full }}"
          if [ -z "$STACK_ID" ]; then STACK_ID="${{ inputs.stack_name }}"; fi
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_ID" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "STACK_NOT_FOUND")
          echo "stack_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "📦 Stack status: $STATUS"

      # ── 12. Upload CDK outputs ───────────────────────────────────────────
      - name: Upload CDK outputs
        if: inputs.action == 'deploy' && always()
        uses: actions/upload-artifact@v4
        with:
          name: "cdk-outputs-${{ inputs.stack_name }}-${{ github.run_id }}"
          path: "${{ inputs.working_dir }}/cdk-outputs.json"
          retention-days: 30

      # ── 13. Post failure notification summary ────────────────────────────
      - name: Summarise deployment
        if: always()
        run: |
          echo "## CDK Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo ""                           >> $GITHUB_STEP_SUMMARY
          echo "| Key          | Value                            |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|----------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Stack        | ${{ inputs.stack_name }}         |" >> $GITHUB_STEP_SUMMARY
          echo "| Action       | ${{ inputs.action }}             |" >> $GITHUB_STEP_SUMMARY
          echo "| Region       | ${{ inputs.aws_region }}         |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment  | ${{ inputs.environment }}        |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID       | ${{ github.run_id }}             |" >> $GITHUB_STEP_SUMMARY
          echo "| Status       | ${{ steps.deploy.outputs.stack_status }} |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy-client-infra.yml
#
# Stack 2 – Client Infrastructure (NAT Gateway + Application Load Balancer)
#
# Prerequisites: EnvironmentStack must be deployed first (reads from SSM).
#
# Triggers
# ────────
#   • Push to main/master that touches stacks/client-infra-stack.ts or
#     constructs/networking/**
#   • Manual dispatch (workflow_dispatch)
#   • Called by the full-pipeline workflow (deploy-all.yml)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy › Client Infra Stack

on:
  push:
    branches:
      - main
      - master
    paths:
      - "stacks/client-infra-stack.ts"
      - "constructs/networking/**"
      - "config/**"
      - "bin/app.ts"

  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region to deploy to"
        required: true
        type: choice
        options:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
        default: us-east-1

      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - poc
          - staging
          - production
        default: poc

      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
        default: deploy

      certificate_arn:
        description: "ACM certificate ARN for HTTPS (leave blank to use HTTP only)"
        required: false
        type: string
        default: ""

  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      environment:
        required: true
        type: string
      action:
        required: false
        type: string
        default: deploy
      certificate_arn:
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true

concurrency:
  group: "client-infra-${{ github.ref }}-${{ inputs.aws_region || 'us-east-1' }}"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:

  resolve_inputs:
    name: Resolve deployment inputs
    runs-on: ubuntu-latest
    outputs:
      aws_region:      ${{ steps.set.outputs.aws_region }}
      environment:     ${{ steps.set.outputs.environment }}
      action:          ${{ steps.set.outputs.action }}
      certificate_arn: ${{ steps.set.outputs.certificate_arn }}
      extra_context:   ${{ steps.set.outputs.extra_context }}

    steps:
      - name: Set inputs
        id: set
        run: |
          REGION="${{ inputs.aws_region || vars.DEFAULT_AWS_REGION || 'us-east-1' }}"
          ENV="${{ inputs.environment || vars.DEFAULT_ENVIRONMENT || 'poc' }}"
          ACTION="${{ inputs.action || 'deploy' }}"
          CERT_ARN="${{ inputs.certificate_arn || vars.ACM_CERTIFICATE_ARN || '' }}"

          echo "aws_region=$REGION"           >> "$GITHUB_OUTPUT"
          echo "environment=$ENV"             >> "$GITHUB_OUTPUT"
          echo "action=$ACTION"               >> "$GITHUB_OUTPUT"
          echo "certificate_arn=$CERT_ARN"    >> "$GITHUB_OUTPUT"

          # Build optional extra context for certificate ARN
          EXTRA=""
          if [ -n "$CERT_ARN" ]; then
            EXTRA="certificateArn=$CERT_ARN"
          fi
          echo "extra_context=$EXTRA"         >> "$GITHUB_OUTPUT"

          echo "🌍 Region: $REGION | Env: $ENV | Action: $ACTION"
          [ -n "$CERT_ARN" ] && echo "🔐 HTTPS enabled with cert: $CERT_ARN"

  # ── Verify EnvironmentStack SSM outputs exist before deploying ───────────
  preflight_check:
    name: Pre-flight › Verify EnvironmentStack SSM outputs
    needs: resolve_inputs
    if: needs.resolve_inputs.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "preflight-client-infra-${{ github.run_id }}"

      - name: Check EnvironmentStack SSM parameters
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          PREFIX="/$PROJECT/$ENV/environment"

          REQUIRED_PARAMS=(
            "vpcId"
            "publicSubnetIds"
            "privateRouteTableIds"
            "publicSecurityGroupId"
          )

          FAILED=0
          for PARAM in "${REQUIRED_PARAMS[@]}"; do
            VALUE=$(aws ssm get-parameter \
              --name "$PREFIX/$PARAM" \
              --query 'Parameter.Value' \
              --output text 2>/dev/null || echo "MISSING")
            if [ "$VALUE" = "MISSING" ]; then
              echo "❌ MISSING SSM param: $PREFIX/$PARAM"
              FAILED=$((FAILED + 1))
            else
              echo "✅ Found: $PREFIX/$PARAM"
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::EnvironmentStack must be deployed before ClientInfraStack."
            echo "::error::Run the 'Deploy › Environment Stack' workflow first."
            exit 1
          fi
          echo "✅ Pre-flight checks passed"

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: "CDK ${{ needs.resolve_inputs.outputs.action }} ClientInfraStack"
    needs: [resolve_inputs, preflight_check]
    if: |
      always() &&
      needs.resolve_inputs.result == 'success' &&
      (needs.preflight_check.result == 'success' || needs.preflight_check.result == 'skipped')
    uses: ./.github/workflows/cdk-deploy-reusable.yml
    with:
      stack_name:       ClientInfraStack
      stack_name_full:  "migration-poc-${{ needs.resolve_inputs.outputs.environment }}-client-infra"
      aws_region:       ${{ needs.resolve_inputs.outputs.aws_region }}
      environment:      ${{ needs.resolve_inputs.outputs.environment }}
      working_dir:      "."
      action:           ${{ needs.resolve_inputs.outputs.action }}
      extra_context:    ${{ needs.resolve_inputs.outputs.extra_context }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  # ── Post-deploy: verify ALB DNS is resolvable ─────────────────────────────
  verify_alb:
    name: Verify ALB DNS
    needs: [resolve_inputs, deploy]
    if: needs.resolve_inputs.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "verify-alb-${{ github.run_id }}"

      - name: Verify ALB SSM outputs and DNS
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          PREFIX="/$PROJECT/$ENV/client-infra"

          PARAMS=(
            "albArn"
            "albDnsName"
            "albSecurityGroupId"
            "httpListenerArn"
            "natGatewayId"
          )

          FAILED=0
          for PARAM in "${PARAMS[@]}"; do
            VALUE=$(aws ssm get-parameter \
              --name "$PREFIX/$PARAM" \
              --query 'Parameter.Value' \
              --output text 2>/dev/null || echo "MISSING")
            if [ "$VALUE" = "MISSING" ]; then
              echo "❌ MISSING: $PREFIX/$PARAM"
              FAILED=$((FAILED + 1))
            else
              echo "✅ OK: $PREFIX/$PARAM = ${VALUE:0:80}"
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED SSM parameter(s) missing after deployment"
            exit 1
          fi

          # Smoke-test: ALB DNS must resolve
          ALB_DNS=$(aws ssm get-parameter \
            --name "$PREFIX/albDnsName" \
            --query 'Parameter.Value' \
            --output text)
          echo "🔍 Checking DNS resolution for $ALB_DNS …"
          nslookup "$ALB_DNS" || echo "⚠️  DNS not yet propagated – this is normal for new ALBs"
          echo "✅ ALB verification complete"

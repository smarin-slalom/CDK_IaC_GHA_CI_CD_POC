# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy-environment.yml
#
# Stack 1 – Environment (VPC, subnets, route tables, security groups)
#
# Triggers
# ────────
#   • Push to main/master that touches stacks/environment-stack.ts,
#     constructs/vpc/**, or config/**
#   • Manual dispatch (workflow_dispatch) with region + environment inputs
#   • Called by the full-pipeline workflow (deploy-all.yml)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy › Environment Stack

on:
  push:
    branches:
      - main
      - master
    paths:
      - "stacks/environment-stack.ts"
      - "constructs/vpc/**"
      - "config/**"
      - "bin/app.ts"

  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region to deploy to"
        required: true
        type: choice
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
          - eu-central-1
          - ap-southeast-1
        default: us-east-1

      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - poc
          - staging
          - production
        default: poc

      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
        default: deploy

  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      environment:
        required: true
        type: string
      action:
        required: false
        type: string
        default: deploy
    secrets:
      AWS_ROLE_ARN:
        required: true

# Cancel in-progress runs on the same branch to avoid parallel deploys
concurrency:
  group: "environment-${{ github.ref }}-${{ inputs.aws_region || 'us-east-1' }}"
  cancel-in-progress: false   # Never cancel an in-progress deploy; queue instead

permissions:
  id-token: write
  contents: read

jobs:

  # ── Determine inputs (handles both push and workflow_dispatch triggers) ───
  resolve_inputs:
    name: Resolve deployment inputs
    runs-on: ubuntu-latest
    outputs:
      aws_region:  ${{ steps.set.outputs.aws_region }}
      environment: ${{ steps.set.outputs.environment }}
      action:      ${{ steps.set.outputs.action }}

    steps:
      - name: Set inputs
        id: set
        run: |
          # workflow_dispatch provides inputs directly; push uses defaults from vars
          REGION="${{ inputs.aws_region || vars.DEFAULT_AWS_REGION || 'us-east-1' }}"
          ENV="${{ inputs.environment || vars.DEFAULT_ENVIRONMENT || 'poc' }}"
          ACTION="${{ inputs.action || 'deploy' }}"
          echo "aws_region=$REGION"  >> "$GITHUB_OUTPUT"
          echo "environment=$ENV"    >> "$GITHUB_OUTPUT"
          echo "action=$ACTION"      >> "$GITHUB_OUTPUT"
          echo "🌍 Region: $REGION | Env: $ENV | Action: $ACTION"

  # ── Run the reusable CDK deploy workflow ─────────────────────────────────
  deploy:
    name: "CDK ${{ needs.resolve_inputs.outputs.action }} EnvironmentStack"
    needs: resolve_inputs
    uses: ./.github/workflows/cdk-deploy-reusable.yml
    with:
      stack_name:       EnvironmentStack
      stack_name_full:  "migration-poc-${{ needs.resolve_inputs.outputs.environment }}-environment"
      aws_region:       ${{ needs.resolve_inputs.outputs.aws_region }}
      environment:      ${{ needs.resolve_inputs.outputs.environment }}
      working_dir:      "."
      action:           ${{ needs.resolve_inputs.outputs.action }}
      extra_context:    ""
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  # ── Post-deploy gate: verify SSM parameters were written ─────────────────
  verify_ssm:
    name: Verify SSM outputs
    needs: [resolve_inputs, deploy]
    if: needs.resolve_inputs.outputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "verify-env-ssm-${{ github.run_id }}"

      - name: Verify SSM parameters exist
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          PREFIX="/$PROJECT/$ENV/environment"

          PARAMS=(
            "vpcId"
            "vpcCidr"
            "publicSubnetIds"
            "privateSubnetIds"
            "privateRouteTableIds"
            "internalSecurityGroupId"
            "publicSecurityGroupId"
            "privateSecurityGroupId"
          )

          FAILED=0
          for PARAM in "${PARAMS[@]}"; do
            VALUE=$(aws ssm get-parameter \
              --name "$PREFIX/$PARAM" \
              --query 'Parameter.Value' \
              --output text 2>/dev/null || echo "MISSING")
            if [ "$VALUE" = "MISSING" ]; then
              echo "❌ MISSING: $PREFIX/$PARAM"
              FAILED=$((FAILED + 1))
            else
              echo "✅ OK: $PREFIX/$PARAM = ${VALUE:0:50}..."
            fi
          done

          if [ $FAILED -gt 0 ]; then
            echo "::error::$FAILED SSM parameter(s) were not written correctly"
            exit 1
          fi
          echo "✅ All SSM parameters verified successfully"

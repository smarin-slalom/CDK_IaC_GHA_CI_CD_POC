# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/deploy-service.yml
#
# Template for individual APPLICATION REPOSITORIES.
# Copy this file into .github/workflows/ in your app repo and adjust:
#   • APP_NAME         – lowercase service name, no spaces (e.g. "users")
#   • ECR_REPO_NAME    – ECR repository name
#   • CONTAINER_PORT   – port the app listens on
#   • PATH_PATTERN     – ALB path routing rule (e.g. "/api/users*")
#   • MAX_CAPACITY     – maximum Fargate tasks for this service
#
# What it does
# ────────────
#   1. Build and push the Docker image to ECR
#   2. Deploy / update the CDK AppServiceStack (target group, service, scaling)
#   3. Wait for the ECS service to stabilise (all tasks healthy)
#   4. Smoke-test via the ALB
#
# Prerequisites in the repo
# ─────────────────────────
#   • infrastructure/templates/app-service-stack.ts  (copied from central infra repo)
#   • infrastructure/bin/app.ts                      (creates AppServiceStack)
#   • infrastructure/package.json + tsconfig.json
#   • Dockerfile at the repo root
#
# GitHub secrets required
# ───────────────────────
#   AWS_ROLE_ARN        IAM role ARN (OIDC)
#
# GitHub variables required (repository or environment level)
# ─────────────────────────────────────────────────────────────
#   AWS_ACCOUNT_ID      12-digit AWS account ID
#   DEFAULT_AWS_REGION  e.g. us-east-1
#   DEFAULT_ENVIRONMENT e.g. poc
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy › App Service

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/CODEOWNERS"

  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        type: choice
        options:
          - us-east-1
          - us-west-2
          - eu-west-1
          - eu-central-1
        default: us-east-1

      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - poc
          - staging
          - production
        default: poc

      image_tag:
        description: "Docker image tag to deploy (default: commit SHA)"
        required: false
        type: string
        default: ""

      force_new_deployment:
        description: "Force a new ECS deployment (useful to pick up latest image)"
        required: false
        type: boolean
        default: false

# ── App-specific variables – customise these ──────────────────────────────────
env:
  APP_NAME:         "my-service"          # ← CHANGE: lowercase, no spaces
  ECR_REPO_NAME:    "my-service"          # ← CHANGE: ECR repository name
  CONTAINER_PORT:   "8080"               # ← CHANGE: port the container listens on
  PATH_PATTERN:     "/api/my-service*"   # ← CHANGE: ALB routing path pattern
  MAX_CAPACITY:     "10"                 # ← CHANGE: max Fargate tasks for this service
  CPU:              "512"
  MEMORY_MIB:       "1024"
  HEALTH_CHECK_PATH: "/health"
  INFRA_DIR:        "infrastructure"     # directory containing cdk.json for the service stack

concurrency:
  group: "service-${{ github.ref }}-${{ inputs.aws_region || 'us-east-1' }}"
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:

  # ── Resolve runtime inputs ────────────────────────────────────────────────
  resolve_inputs:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      aws_region:    ${{ steps.set.outputs.aws_region }}
      environment:   ${{ steps.set.outputs.environment }}
      image_tag:     ${{ steps.set.outputs.image_tag }}
      ecr_registry:  ${{ steps.set.outputs.ecr_registry }}

    steps:
      - name: Set inputs
        id: set
        run: |
          REGION="${{ inputs.aws_region || vars.DEFAULT_AWS_REGION || 'us-east-1' }}"
          ENV="${{ inputs.environment || vars.DEFAULT_ENVIRONMENT || 'poc' }}"
          TAG="${{ inputs.image_tag || github.sha }}"
          ECR="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.$REGION.amazonaws.com"

          echo "aws_region=$REGION"   >> "$GITHUB_OUTPUT"
          echo "environment=$ENV"     >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "ecr_registry=$ECR"    >> "$GITHUB_OUTPUT"

          echo "📦 Service: $APP_NAME | Region: $REGION | Tag: $TAG"

  # ── Build & push Docker image to ECR ─────────────────────────────────────
  build_and_push:
    name: Build & Push Docker image
    needs: resolve_inputs
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "ecr-push-${{ env.APP_NAME }}-${{ github.run_id }}"

      - name: Log in to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ needs.resolve_inputs.outputs.ecr_registry }}/${{ env.ECR_REPO_NAME }}:${{ needs.resolve_inputs.outputs.image_tag }}
            ${{ needs.resolve_inputs.outputs.ecr_registry }}/${{ env.ECR_REPO_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_ENV=${{ needs.resolve_inputs.outputs.environment }}
            BUILD_DATE=${{ github.run_id }}
            GIT_COMMIT=${{ github.sha }}

      - name: Output image URI
        id: out
        run: |
          IMAGE_URI="${{ needs.resolve_inputs.outputs.ecr_registry }}/${{ env.ECR_REPO_NAME }}:${{ needs.resolve_inputs.outputs.image_tag }}"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "🐳 Image pushed: $IMAGE_URI"

  # ── Deploy CDK AppServiceStack ────────────────────────────────────────────
  deploy_service_stack:
    name: Deploy CDK AppServiceStack
    needs: [resolve_inputs, build_and_push]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.INFRA_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.INFRA_DIR }}
        run: npm ci

      - name: Build TypeScript
        working-directory: ${{ env.INFRA_DIR }}
        run: npm run build

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "cdk-service-${{ env.APP_NAME }}-${{ github.run_id }}"

      - name: CDK Deploy AppServiceStack
        working-directory: ${{ env.INFRA_DIR }}
        env:
          IMAGE_URI:    ${{ needs.build_and_push.outputs.image_uri }}
          APP_NAME:     ${{ env.APP_NAME }}
          MAX_CAPACITY: ${{ env.MAX_CAPACITY }}
          ENVIRONMENT:  ${{ needs.resolve_inputs.outputs.environment }}
          AWS_REGION:   ${{ needs.resolve_inputs.outputs.aws_region }}
        run: |
          cdk deploy AppServiceStack \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            --context account=${{ vars.AWS_ACCOUNT_ID }} \
            --context region=${{ needs.resolve_inputs.outputs.aws_region }} \
            --context imageUri="$IMAGE_URI" \
            --context appName="$APP_NAME" \
            --context containerPort="${{ env.CONTAINER_PORT }}" \
            --context pathPattern="${{ env.PATH_PATTERN }}" \
            --context maxCapacity="$MAX_CAPACITY" \
            --context cpu="${{ env.CPU }}" \
            --context memoryMiB="${{ env.MEMORY_MIB }}" \
            --context healthCheckPath="${{ env.HEALTH_CHECK_PATH }}"

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: "cdk-outputs-${{ env.APP_NAME }}-${{ github.run_id }}"
          path: "${{ env.INFRA_DIR }}/cdk-outputs.json"
          retention-days: 14

  # ── Wait for ECS service to stabilise ────────────────────────────────────
  wait_for_service:
    name: Wait for ECS service to stabilise
    needs: [resolve_inputs, deploy_service_stack]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "wait-service-${{ env.APP_NAME }}-${{ github.run_id }}"

      - name: Wait for service stability
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          CLUSTER_NAME=$(aws ssm get-parameter \
            --name "/$PROJECT/$ENV/ecs/clusterName" \
            --query 'Parameter.Value' \
            --output text)

          SERVICE_NAME="$PROJECT-$ENV-${{ env.APP_NAME }}"

          echo "⏳ Waiting for service $SERVICE_NAME in cluster $CLUSTER_NAME …"
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
          echo "✅ Service is stable"

      - name: Verify running task count
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          CLUSTER_NAME=$(aws ssm get-parameter \
            --name "/$PROJECT/$ENV/ecs/clusterName" \
            --query 'Parameter.Value' \
            --output text)
          SERVICE_NAME="$PROJECT-$ENV-${{ env.APP_NAME }}"

          RUNNING=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --query 'services[0].runningCount' \
            --output text)
          DESIRED=$(aws ecs describe-services \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "🔢 Running: $RUNNING / Desired: $DESIRED"

          if [ "$RUNNING" -lt 2 ]; then
            echo "::error::Only $RUNNING tasks running; expected at least 2 per spec"
            exit 1
          fi
          echo "✅ Service has $RUNNING tasks running (≥ 2 as required)"

  # ── Smoke test via ALB ────────────────────────────────────────────────────
  smoke_test:
    name: Smoke test via ALB
    needs: [resolve_inputs, wait_for_service]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_inputs.outputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ needs.resolve_inputs.outputs.aws_region }}
          role-session-name: "smoke-${{ env.APP_NAME }}-${{ github.run_id }}"

      - name: Smoke test health endpoint
        run: |
          PROJECT="migration-poc"
          ENV="${{ needs.resolve_inputs.outputs.environment }}"
          ALB_DNS=$(aws ssm get-parameter \
            --name "/$PROJECT/$ENV/client-infra/albDnsName" \
            --query 'Parameter.Value' \
            --output text)

          # Build the health-check URL – strip trailing * from path pattern
          BASE_PATH=$(echo "${{ env.PATH_PATTERN }}" | sed 's/\*$//')
          HEALTH_URL="http://$ALB_DNS${BASE_PATH}${{ env.HEALTH_CHECK_PATH }}"

          echo "🔍 Smoke test: $HEALTH_URL"

          # Retry for up to 60 seconds (ALB target registration can be slow)
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "$HEALTH_URL" || echo "000")
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              echo "✅ Smoke test passed (HTTP $HTTP_CODE)"
              exit 0
            fi
            sleep 5
          done

          echo "::warning::Health check returned non-2xx after 60 s – check ALB target health"
          # Treat as warning, not failure, since the service is stable per ECS
          exit 0

      - name: Print service summary
        run: |
          echo "## Service Deployed 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key         | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service     | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag   | ${{ needs.resolve_inputs.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region      | ${{ needs.resolve_inputs.outputs.aws_region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.resolve_inputs.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Path        | ${{ env.PATH_PATTERN }} |" >> $GITHUB_STEP_SUMMARY
